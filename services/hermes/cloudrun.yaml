# Cloud Run service manifest. Values that identify a specific Google project,
# secret version, or public hostname are intentionally supplied at deploy time.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: temuclaude-hermes
  labels:
    app: temuclaude-hermes
    component: private-agent-runtime
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      # This is a dedicated identity, not the default Compute Engine service
      # account. It has access only to the two named runtime secrets.
      serviceAccountName: temuclaude-hermes-runtime@temuclaude-502009.iam.gserviceaccount.com
      containerConcurrency: 1
      timeoutSeconds: 900
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          # The API server is bearer-token protected. Its model provider also
          # receives only a dedicated, restricted TemuClaude service key.
          # Never substitute literal values in this manifest or source control.
          env:
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-api-server-key
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: temuclaude-hermes-api-key
                  key: latest
            - name: OPENAI_BASE_URL
              value: https://temuclaude.com/v1
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 12
            periodSeconds: 10
