<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  overflow: hidden;
  touch-action: none;
}
.wrap {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.title {
  font-size: 56px;
  font-weight: 800;
  color: #f0a500;
  letter-spacing: -2px;
}
.scores { display: flex; gap: 10px; }
.score-box {
  background: #2a2a4e;
  border-radius: 8px;
  padding: 8px 16px;
  text-align: center;
  min-width: 80px;
}
.score-label {
  font-size: 11px;
  text-transform: uppercase;
  color: #aaa;
  letter-spacing: 1px;
}
.score-val {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.subtitle {
  font-size: 14px;
  color: #999;
}
.btn {
  background: #f0a500;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}
.btn:hover { background: #ffb733; }
.btn:active { transform: scale(0.95); }
.board {
  position: relative;
  background: #2a2a4e;
  border-radius: 12px;
  padding: 12px;
  aspect-ratio: 1;
  width: 100%;
  touch-action: none;
}
.grid-bg {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 12px;
  height: 100%;
}
.cell-bg {
  background: #3a3a5e;
  border-radius: 8px;
}
.tiles {
  position: absolute;
  inset: 12px;
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  border-radius: 8px;
  transition: transform 0.12s ease, opacity 0.12s ease;
  user-select: none;
}
.tile.new { animation: pop 0.18s ease; }
.tile.merged { animation: merge 0.2s ease; z-index: 2; }
@keyframes pop {
  0% { transform: scale(0); }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes merge {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(26,26,46,0.85);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 10;
}
.overlay.show { opacity: 1; pointer-events: auto; }
.overlay h2 {
  font-size: 48px;
  color: #f0a500;
}
.overlay.win h2 { color: #4ade80; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-val" id="best">0</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <div class="subtitle">Join tiles to reach 2048!</div>
    <button class="btn" id="newGame">New Game</button>
  </div>
  <div class="board" id="board">
    <div class="grid-bg" id="gridBg"></div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">Game Over!</h2>
      <button class="btn" id="overlayBtn">Try Again</button>
    </div>
  </div>
</div>
<script>
(function(){
  const SIZE = 4;
  const GAP = 12;
  let grid, score, best, won, tileId;
  const tilesEl = document.getElementById('tiles');
  const gridBg = document.getElementById('gridBg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const board = document.getElementById('board');

  // Build background grid
  for (let i = 0; i < SIZE*SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell-bg';
    gridBg.appendChild(c);
  }

  const COLORS = {
    2: ['#3a3a5e','#eee'],
    4: ['#4a4a7e','#eee'],
    8: ['#f0a500','#1a1a2e'],
    16: ['#ff8c42','#fff'],
    32: ['#ff6b6b','#fff'],
    64: ['#ee5a6f','#fff'],
    128: ['#c44569','#fff'],
    256: ['#9b59b6','#fff'],
    512: ['#6c5ce7','#fff'],
    1024: ['#4ade80','#1a1a2e'],
    2048: ['#00d2d3','#1a1a2e'],
    4096: ['#0abde3','#fff'],
    8192: ['#ff9ff3','#1a1a2e']
  };

  function getCellSize() {
    const w = board.clientWidth - GAP*2;
    return (w - GAP*(SIZE-1)) / SIZE;
  }

  function pos(index) {
    const cs = getCellSize();
    return index * (cs + GAP);
  }

  function tileStyle(el, value, r, c) {
    const cs = getCellSize();
    el.style.width = cs + 'px';
    el.style.height = cs + 'px';
    el.style.transform = `translate(${pos(c)}px, ${pos(r)}px)`;
    const [bg, fg] = COLORS[value] || ['#0abde3','#fff'];
    el.style.background = bg;
    el.style.color = fg;
    const len = String(value).length;
    let fs = cs * 0.45;
    if (len >= 3) fs = cs * 0.36;
    if (len >= 4) fs = cs * 0.28;
    el.style.fontSize = fs + 'px';
    el.textContent = value;
  }

  function init() {
    grid = [];
    for (let r = 0; r < SIZE; r++) grid.push([null,null,null,null]);
    score = 0;
    won = false;
    tileId = 1;
    best = parseInt(localStorage.getItem('best2048') || '0', 10);
    bestEl.textContent = best;
    scoreEl.textContent = 0;
    tilesEl.innerHTML = '';
    overlay.classList.remove('show','win');
    addRandom();
    addRandom();
    render();
  }

  function addRandom() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!grid[r][c]) empty.push([r,c]);
    if (!empty.length) return;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    const val = Math.random() < 0.9 ? 2 : 4;
    const tile = { id: tileId++, value: val, r, c, isNew: true };
    grid[r][c] = tile;
  }

  function render() {
    tilesEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const t = grid[r][c];
        if (t) {
          const el = document.createElement('div');
          el.className = 'tile';
          if (t.isNew) { el.classList.add('new'); t.isNew = false; }
          if (t.merged) { el.classList.add('merged'); t.merged = false; }
          tileStyle(el, t.value, r, c);
          tilesEl.appendChild(el);
        }
      }
    }
  }

  function move(dir) {
    // dir: 0=up,1=right,2=down,3=left
    let moved = false;
    let gained = 0;
    const merged = new Set();

    const lines = [];
    if (dir === 3) { // left
      for (let r = 0; r < SIZE; r++) lines.push([0,1,2,3].map(c=>[r,c]));
    } else if (dir === 1) { // right
      for (let r = 0; r < SIZE; r++) lines.push([3,2,1,0].map(c=>[r,c]));
    } else if (dir === 0) { // up
      for (let c = 0; c < SIZE; c++) lines.push([0,1,2,3].map(r=>[r,c]));
    } else { // down
      for (let c = 0; c < SIZE; c++) lines.push([3,2,1,0].map(r=>[r,c]));
    }

    for (const line of lines) {
      const tiles = line.map(([r,c]) => grid[r][c]).filter(t => t);
      const result = [];
      let i = 0;
      while (i < tiles.length) {
        if (i+1 < tiles.length && tiles[i].value === tiles[i+1].value) {
          const newVal = tiles[i].value * 2;
          result.push({ ...tiles[i], value: newVal, merged: true });
          gained += newVal;
          if (newVal === 2048 && !won) won = true;
          // mark second tile for removal
          tiles[i+1].removed = true;
          i += 2;
        } else {
          result.push(tiles[i]);
          i++;
        }
      }
      // place result back into line positions
      for (let k = 0; k < line.length; k++) {
        const [r,c] = line[k];
        if (k < result.length) {
          const t = result[k];
          if (t.r !== r || t.c !== c) moved = true;
          t.r = r; t.c = c;
          grid[r][c] = t;
        } else {
          if (grid[r][c]) moved = true;
          grid[r][c] = null;
        }
      }
    }

    if (moved) {
      score += gained;
      if (score > best) {
        best = score;
        localStorage.setItem('best2048', best);
      }
      scoreEl.textContent = score;
      bestEl.textContent = best;
      addRandom();
      render();
      if (won) {
        setTimeout(() => {
          overlayTitle.textContent = 'You Win! 🎉';
          overlay.classList.add('show','win');
        }, 200);
        won = 'done';
      } else if (isGameOver()) {
        setTimeout(() => {
          overlayTitle.textContent = 'Game Over!';
          overlay.classList.remove('win');
          overlay.classList.add('show');
        }, 200);
      }
    }
  }

  function isGameOver() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return false;
        const v = grid[r][c].value;
        if (c+1 < SIZE && grid[r][c+1] && grid[r][c+1].value === v) return false;
        if (r+1 < SIZE && grid[r+1][c] && grid[r+1][c].value === v) return false;
      }
    }
    return true;
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const map = { ArrowUp:0, ArrowRight:1, ArrowDown:2, ArrowLeft:3,
                  w:0, d:1, s:2, a:3, W:0, D:1, S:2, A:3 };
    if (e.key in map) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  // Swipe
  let sx, sy, st;
  board.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
  }, { passive: true });
  board.addEventListener('touchend', (e) => {
    if (sx == null) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 25) return;
    if (adx > ady) move(dx > 0 ? 1 : 3);
    else move(dy > 0 ? 2 : 0);
    sx = null;
  }, { passive: true });

  // Mouse swipe (optional)
  let md = false, mx, my;
  board.addEventListener('mousedown', (e) => { md = true; mx = e.clientX; my = e.clientY; });
  board.addEventListener('mouseup', (e) => {
    if (!md) return;
    md = false;
    const dx = e.clientX - mx, dy = e.clientY - my;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 30) return;
    if (adx > ady) move(dx > 0 ? 1 : 3);
    else move(dy > 0 ? 2 : 0);
  });

  document.getElementById('newGame').addEventListener('click', init);
  document.getElementById('overlayBtn').addEventListener('click', init);

  window.addEventListener('resize', render);

  init();
})();
</script>
</body>
</html>
