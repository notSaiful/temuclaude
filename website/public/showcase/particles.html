<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Particle Galaxy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  .hud {
    position: fixed; top: 18px; left: 18px;
    color: #cfd8ff; font-size: 13px; letter-spacing: 0.5px;
    background: rgba(15, 18, 40, 0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(120, 140, 255, 0.18);
    padding: 12px 16px; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.03);
    z-index: 10; user-select: none;
  }
  .hud .row { display: flex; justify-content: space-between; gap: 18px; margin: 4px 0; }
  .hud .label { color: #7a86c0; }
  .hud .val { color: #ffd9a8; font-weight: 600; font-variant-numeric: tabular-nums; }
  .hud .title { font-size: 11px; color: #8aa0ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }

  .reset-btn {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px;
    background: rgba(20, 24, 50, 0.35);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(140, 160, 255, 0.25);
    color: #e8ecff; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    border-radius: 999px; cursor: pointer; z-index: 10;
    transition: all 0.25s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .reset-btn:hover {
    background: rgba(60, 70, 130, 0.45);
    border-color: rgba(180, 200, 255, 0.5);
    color: #fff;
    box-shadow: 0 8px 40px rgba(80, 100, 255, 0.35), inset 0 0 0 1px rgba(255,255,255,0.08);
    transform: translateX(-50%) translateY(-2px);
  }
  .reset-btn:active { transform: translateX(-50%) translateY(0); }

  .hint {
    position: fixed; bottom: 22px; right: 22px;
    color: #5a64a0; font-size: 11px; letter-spacing: 1px;
    z-index: 10; user-select: none; text-align: right; line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="galaxy"></canvas>

<div class="hud">
  <div class="title">Galaxy Telemetry</div>
  <div class="row"><span class="label">FPS</span><span class="val" id="fps">0</span></div>
  <div class="row"><span class="label">Particles</span><span class="val" id="count">0</span></div>
  <div class="row"><span class="label">Arms</span><span class="val" id="arms">3</span></div>
</div>

<button class="reset-btn" id="reset">Reset Galaxy</button>

<div class="hint">Move mouse to attract<br>Click for shockwave</div>

<script>
const canvas = document.getElementById('galaxy');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// --- Config ---
const PARTICLE_COUNT = 1600;
const ARMS = 3;
const ARM_TIGHTNESS = 0.18;   // spiral twist per pixel radius
const ARM_SPREAD = 0.45;      // angular scatter around arm
const CORE_RADIUS = 40;
const GALAXY_RADIUS = () => Math.min(W, H) * 0.42;

const mouse = { x: -9999, y: -9999, active: false };
const shockwaves = [];

// --- Particle ---
class Particle {
  constructor() { this.init(); }
  init() {
    const R = GALAXY_RADIUS();
    // distance distribution: more density toward center
    const t = Math.pow(Math.random(), 1.8);
    this.radius = CORE_RADIUS + t * (R - CORE_RADIUS);

    // pick an arm
    const arm = Math.floor(Math.random() * ARMS);
    const armAngle = (arm / ARMS) * Math.PI * 2;
    const spiralOffset = this.radius * ARM_TIGHTNESS;
    const scatter = (Math.random() - 0.5) * ARM_SPREAD * (1 + this.radius / R * 1.5);
    this.angle = armAngle + spiralOffset + scatter;

    // orbital speed: inner faster (Keplerian-ish but softened)
    this.speed = (0.0009 + 0.0006 * (1 - this.radius / R)) * (Math.random() * 0.4 + 0.85);
    if (Math.random() < 0.5) this.speed *= 1; // all same direction for clean spiral

    this.size = Math.random() * 1.6 + 0.4;
    // central particles slightly bigger & brighter
    if (this.radius < CORE_RADIUS * 1.5) this.size *= 1.4;

    this.baseAlpha = Math.random() * 0.5 + 0.5;
    this.alpha = this.baseAlpha;

    // color based on radius (warm center -> cool edge)
    this.color = this.computeColor();

    // displacement from mouse interaction
    this.dx = 0;
    this.dy = 0;
    this.vx = 0;
    this.vy = 0;

    // twinkle
    this.twinkleSpeed = Math.random() * 0.04 + 0.01;
    this.twinklePhase = Math.random() * Math.PI * 2;
  }

  computeColor() {
    const R = GALAXY_RADIUS();
    const t = Math.min(1, (this.radius - CORE_RADIUS) / (R - CORE_RADIUS));
    // gradient stops: 0=white/yellow, 0.25=orange, 0.55=pink/magenta, 1=blue/purple
    const stops = [
      { p: 0.00, c: [255, 245, 210] },
      { p: 0.18, c: [255, 200, 110] },
      { p: 0.40, c: [255, 130, 110] },
      { p: 0.62, c: [200, 110, 200] },
      { p: 0.82, c: [110, 130, 240] },
      { p: 1.00, c: [80, 90, 200] }
    ];
    let a = stops[0], b = stops[stops.length - 1];
    for (let i = 0; i < stops.length - 1; i++) {
      if (t >= stops[i].p && t <= stops[i + 1].p) { a = stops[i]; b = stops[i + 1]; break; }
    }
    const span = (b.p - a.p) || 1;
    const k = (t - a.p) / span;
    const r = Math.round(a.c[0] + (b.c[0] - a.c[0]) * k);
    const g = Math.round(a.c[1] + (b.c[1] - a.c[1]) * k);
    const bl = Math.round(a.c[2] + (b.c[2] - a.c[2]) * k);
    return { r, g, b: bl };
  }

  update(dt) {
    // orbital motion
    this.angle += this.speed * dt;

    // twinkle
    this.twinklePhase += this.twinkleSpeed * dt;
    const twinkle = 0.7 + 0.3 * Math.sin(this.twinklePhase);

    // mouse attraction
    const px = cx + Math.cos(this.angle) * this.radius + this.dx;
    const py = cy + Math.sin(this.angle) * this.radius + this.dy;

    if (mouse.active) {
      const mdx = mouse.x - px;
      const mdy = mouse.y - py;
      const dist2 = mdx * mdx + mdy * mdy;
      if (dist2 < 150 * 150) {
        const dist = Math.sqrt(dist2) || 1;
        const force = (1 - dist / 150) * 0.8;
        this.vx += (mdx / dist) * force;
        this.vy += (mdy / dist) * force;
      }
    }

    // spring back to orbit position
    this.vx += -this.dx * 0.012;
    this.vy += -this.dy * 0.012;
    this.vx *= 0.92;
    this.vy *= 0.92;
    this.dx += this.vx;
    this.dy += this.vy;

    // shockwave influence
    for (let i = 0; i < shockwaves.length; i++) {
      const s = shockwaves[i];
      const sx = cx + Math.cos(this.angle) * this.radius + this.dx;
      const sy = cy + Math.sin(this.angle) * this.radius + this.dy;
      const ddx = sx - s.x;
      const ddy = sy - s.y;
      const d = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
      const ringWidth = 60;
      if (Math.abs(d - s.radius) < ringWidth) {
        const force = (1 - Math.abs(d - s.radius) / ringWidth) * s.strength;
        this.vx += (ddx / d) * force;
        this.vy += (ddy / d) * force;
      }
    }

    this.alpha = this.baseAlpha * twinkle;
  }

  draw() {
    const x = cx + Math.cos(this.angle) * this.radius + this.dx;
    const y = cy + Math.sin(this.angle) * this.radius + this.dy;
    const c = this.color;
    ctx.shadowBlur = this.size * 6;
    ctx.shadowColor = `rgba(${c.r},${c.g},${c.b},${this.alpha})`;
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${this.alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

let particles = [];
function buildGalaxy() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
  document.getElementById('count').textContent = particles.length;
  document.getElementById('arms').textContent = ARMS;
}
buildGalaxy();

// --- Background nebula ---
function drawBackground() {
  // base
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // nebula radial gradients
  const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.55);
  g1.addColorStop(0, 'rgba(80, 50, 120, 0.18)');
  g1.addColorStop(0.4, 'rgba(40, 30, 90, 0.10)');
  g1.addColorStop(1, 'rgba(5, 5, 16, 0)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  // off-center warm cloud
  const g2 = ctx.createRadialGradient(cx - W * 0.15, cy + H * 0.1, 0, cx - W * 0.15, cy + H * 0.1, W * 0.4);
  g2.addColorStop(0, 'rgba(120, 60, 40, 0.12)');
  g2.addColorStop(1, 'rgba(5, 5, 16, 0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);

  // cool cloud
  const g3 = ctx.createRadialGradient(cx + W * 0.2, cy - H * 0.15, 0, cx + W * 0.2, cy - H * 0.15, W * 0.45);
  g3.addColorStop(0, 'rgba(40, 60, 140, 0.14)');
  g3.addColorStop(1, 'rgba(5, 5, 16, 0)');
  ctx.fillStyle = g3;
  ctx.fillRect(0, 0, W, H);
}

// --- Shockwave ---
function addShockwave(x, y) {
  shockwaves.push({ x, y, radius: 0, maxRadius: Math.max(W, H) * 0.6, strength: 14, life: 1 });
}

function updateShockwaves(dt) {
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.radius += 9 * dt;
    s.strength *= 0.96;
    s.life -= 0.012 * dt;
    if (s.radius > s.maxRadius || s.life <= 0) shockwaves.splice(i, 1);
  }
}

function drawShockwaves() {
  for (const s of shockwaves) {
    ctx.save();
    ctx.shadowBlur = 30;
    ctx.shadowColor = `rgba(180, 200, 255, ${s.life * 0.6})`;
    ctx.strokeStyle = `rgba(200, 220, 255, ${s.life * 0.5})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(255, 180, 120, ${s.life * 0.3})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius * 0.92, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// --- Core glow ---
function drawCore() {
  const r = 90;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, 'rgba(255, 240, 200, 0.55)');
  g.addColorStop(0.3, 'rgba(255, 180, 120, 0.25)');
  g.addColorStop(1, 'rgba(255, 120, 80, 0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
}

// --- Input ---
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; mouse.x = -9999; mouse.y = -9999; });
canvas.addEventListener('click', (e) => addShockwave(e.clientX, e.clientY));
canvas.addEventListener('touchmove', (e) => {
  if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true; }
}, { passive: true });
canvas.addEventListener('touchend', () => { mouse.active = false; });
canvas.addEventListener('touchstart', (e) => {
  if (e.touches[0]) addShockwave(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

document.getElementById('reset').addEventListener('click', () => {
  shockwaves.length = 0;
  buildGalaxy();
});

// --- FPS ---
let fps = 0, frames = 0, fpsTime = performance.now();
const fpsEl = document.getElementById('fps');

// --- Loop ---
let lastTime = performance.now();
function loop(now) {
  const rawDt = (now - lastTime) / 16.6667; // normalize to ~60fps frame
  const dt = Math.min(rawDt, 3);
  lastTime = now;

  // FPS calc
  frames++;
  if (now - fpsTime >= 500) {
    fps = Math.round((frames * 1000) / (now - fpsTime));
    fpsEl.textContent = fps;
    frames = 0;
    fpsTime = now;
  }

  // trail effect: partial clear for motion blur
  ctx.globalCompositeOperation = 'source-over';
  drawBackground();

  // additive blending for glow
  ctx.globalCompositeOperation = 'lighter';

  drawCore();

  for (let i = 0; i < particles.length; i++) {
    particles[i].update(dt);
    particles[i].draw();
  }

  updateShockwaves(dt);
  drawShockwaves();

  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
