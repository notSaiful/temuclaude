<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Solar System</title>
    <style>
        :root {
            --bg: #000005;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body.dragging {
            cursor: grabbing;
        }

        body.pointer-cursor {
            cursor: pointer;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #info-panel {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 340px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            z-index: 10;
            background: rgba(12, 16, 32, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            padding: 28px 24px 24px;
            color: #e0e0e0;
            transform: translateX(calc(100% + 40px));
            transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            overflow-y: auto;
            pointer-events: auto;
        }

        #info-panel.visible {
            transform: translateX(0);
        }

        #info-panel .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        #info-panel .close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        #info-panel .planet-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            margin-bottom: 14px;
            box-shadow: 0 0 28px rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        #info-panel .planet-name {
            font-size: 1.7em;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #fff;
            margin-bottom: 6px;
        }

        #info-panel .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 16px 0;
        }

        #info-panel .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 7px 0;
            font-size: 0.92em;
            color: #bbb;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        #info-panel .info-row .label {
            color: #888;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        #info-panel .info-row .value {
            color: #e8e8e8;
            font-weight: 500;
            text-align: right;
        }

        #info-panel .fun-fact {
            margin-top: 14px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            font-size: 0.88em;
            line-height: 1.5;
            color: #c0c0c0;
            border-left: 3px solid rgba(255, 255, 255, 0.25);
        }

        #info-panel .fun-fact::before {
            content: '💡 ';
            font-size: 0.95em;
        }

        .hint-text {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.82em;
            letter-spacing: 0.03em;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.6s;
        }

        @media (max-width: 500px) {
            #info-panel {
                width: calc(100vw - 32px);
                right: 16px;
                top: 16px;
                max-height: 60vh;
                border-radius: 16px;
                padding: 20px 16px 16px;
            }
            #info-panel .planet-name {
                font-size: 1.3em;
            }
            #info-panel .planet-icon {
                width: 40px;
                height: 40px;
            }
            .hint-text {
                bottom: 16px;
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>

    <canvas id="solarCanvas"></canvas>

    <div id="info-panel">
        <button class="close-btn" id="closePanel" aria-label="Close">✕</button>
        <div class="planet-icon" id="panelIcon"></div>
        <div class="planet-name" id="panelName"></div>
        <div class="divider"></div>
        <div class="info-row"><span class="label">Diameter</span><span class="value" id="panelDiameter"></span></div>
        <div class="info-row"><span class="label">Distance from Sun</span><span class="value" id="panelDistance"></span></div>
        <div class="info-row"><span class="label">Orbital Period</span><span class="value" id="panelPeriod"></span></div>
        <div class="fun-fact" id="panelFact"></div>
    </div>

    <div class="hint-text" id="hintText">🖱 Scroll to zoom &nbsp;|&nbsp; Drag to pan &nbsp;|&nbsp; Click a planet</div>

    <script>
        (function() {
            const canvas = document.getElementById('solarCanvas');
            const ctx = canvas.getContext('2d');
            const infoPanel = document.getElementById('info-panel');
            const hintText = document.getElementById('hintText');
            const closePanelBtn = document.getElementById('closePanel');
            const body = document.body;

            // Info panel elements
            const panelIcon = document.getElementById('panelIcon');
            const panelName = document.getElementById('panelName');
            const panelDiameter = document.getElementById('panelDiameter');
            const panelDistance = document.getElementById('panelDistance');
            const panelPeriod = document.getElementById('panelPeriod');
            const panelFact = document.getElementById('panelFact');

            // --- Planet Definitions ---
            const planetDefs = [{
                name: 'Mercury',
                color: '#c2c2c2',
                glowColor: '#d9d9d9',
                radius: 5.5,
                orbitRadius: 62,
                orbitRx: 63,
                orbitRy: 58,
                speed: 4.15,
                diameter: '4,879 km',
                distance: '57.9M km',
                period: '88 days',
                fact: 'Mercury has virtually no atmosphere and experiences temperature swings of over 600°C between day and night.',
                initialAngle: Math.random() * Math.PI * 2
            }, {
                name: 'Venus',
                color: '#e8cda0',
                glowColor: '#f0dbb8',
                radius: 8,
                orbitRadius: 92,
                orbitRx: 94,
                orbitRy: 87,
                speed: 1.62,
                diameter: '12,104 km',
                distance: '108.2M km',
                period: '225 days',
                fact: 'Venus rotates backwards compared to most planets, and its day is longer than its year.',
                initialAngle: Math.random() * Math.PI * 2
            }, {
                name: 'Earth',
                color: '#4da6ff',
                glowColor: '#7cc0ff',
                radius: 8.5,
                orbitRadius: 128,
                orbitRx: 130,
                orbitRy: 122,
                speed: 1.0,
                diameter: '12,742 km',
                distance: '149.6M km',
                period: '365.25 days',
                fact: 'Earth is the only known planet to support life, with liquid water covering 71% of its surface.',
                initialAngle: Math.random() * Math.PI * 2
            }, {
                name: 'Mars',
                color: '#e0553d',
                glowColor: '#f0705a',
                radius: 6,
                orbitRadius: 168,
                orbitRx: 171,
                orbitRy: 160,
                speed: 0.53,
                diameter: '6,779 km',
                distance: '227.9M km',
                period: '687 days',
                fact: 'Mars has the largest volcano in the solar system, Olympus Mons, which is about 2.5 times the height of Mount Everest.',
                initialAngle: Math.random() * Math.PI * 2
            }, {
                name: 'Jupiter',
                color: '#d4a574',
                glowColor: '#e8c8a0',
                radius: 22,
                orbitRadius: 240,
                orbitRx: 244,
                orbitRy: 228,
                speed: 0.084,
                diameter: '139,820 km',
                distance: '778.5M km',
                period: '11.86 years',
                fact: 'Jupiter\'s Great Red Spot is a storm that has been raging for over 350 years and is larger than Earth.',
                initialAngle: Math.random() * Math.PI * 2,
                hasBands: true
            }, {
                name: 'Saturn',
                color: '#e8d5a3',
                glowColor: '#f5e8c0',
                radius: 18,
                orbitRadius: 310,
                orbitRx: 315,
                orbitRy: 295,
                speed: 0.034,
                diameter: '116,460 km',
                distance: '1.43B km',
                period: '29.46 years',
                fact: 'Saturn\'s rings are made mostly of ice particles and rocky debris, spanning up to 282,000 km wide but only about 10 meters thick.',
                initialAngle: Math.random() * Math.PI * 2,
                hasRings: true
            }, {
                name: 'Uranus',
                color: '#7ec8e3',
                glowColor: '#a0ddf0',
                radius: 14,
                orbitRadius: 380,
                orbitRx: 386,
                orbitRy: 362,
                speed: 0.012,
                diameter: '50,724 km',
                distance: '2.87B km',
                period: '84.01 years',
                fact: 'Uranus rotates on its side with an axial tilt of 98°, likely caused by a massive ancient collision.',
                initialAngle: Math.random() * Math.PI * 2
            }, {
                name: 'Neptune',
                color: '#3f54ba',
                glowColor: '#5c70d0',
                radius: 13,
                orbitRadius: 440,
                orbitRx: 447,
                orbitRy: 418,
                speed: 0.006,
                diameter: '49,244 km',
                distance: '4.5B km',
                period: '164.8 years',
                fact: 'Neptune has the strongest sustained winds in the solar system, reaching speeds of over 2,100 km/h.',
                initialAngle: Math.random() * Math.PI * 2
            }];

            // --- State ---
            let panX = 0;
            let panY = 0;
            let zoom = 1.0;
            const ZOOM_MIN = 0.25;
            const ZOOM_MAX = 4.5;
            let elapsedTime = 0;
            let selectedPlanetName = null;
            let hoveredPlanetName = null;
            let isDragging = false;
            let dragStartScreenX = 0;
            let dragStartScreenY = 0;
            let dragStartPanX = 0;
            let dragStartPanY = 0;
            let totalDragDist = 0;
            let mouseScreenX = 0;
            let mouseScreenY = 0;
            let canvasWidth, canvasHeight;
            let halfW, halfH;

            // Trail storage: planet name -> array of {x, y}
            const trails = {};
            const MAX_TRAIL_POINTS = 90;
            planetDefs.forEach(p => { trails[p.name] = []; });

            // --- Stars ---
            const stars = [];
            const STAR_COUNT = 280;
            const STAR_WORLD_SPREAD = 1800;

            function generateStars() {
                stars.length = 0;
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: (Math.random() - 0.5) * STAR_WORLD_SPREAD * 2,
                        y: (Math.random() - 0.5) * STAR_WORLD_SPREAD * 2,
                        size: Math.random() * 2.2 + 0.4,
                        baseOpacity: Math.random() * 0.55 + 0.3,
                        twinkleAmp: Math.random() * 0.4 + 0.05,
                        twinkleSpeed: Math.random() * 3.5 + 0.8,
                        twinklePhase: Math.random() * Math.PI * 2,
                        hue: Math.random() < 0.15 ? (Math.random() * 40 + 200) : (Math.random() * 60),
                        saturation: Math.random() * 30,
                    });
                }
            }
            generateStars();

            // --- Resize ---
            function resizeCanvas() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                canvas.width = canvasWidth * dpr;
                canvas.height = canvasHeight * dpr;
                canvas.style.width = canvasWidth + 'px';
                canvas.style.height = canvasHeight + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                halfW = canvasWidth / 2;
                halfH = canvasHeight / 2;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Coordinate transforms ---
            function worldToScreen(wx, wy) {
                return {
                    sx: (wx - panX) * zoom + halfW,
                    sy: (wy - panY) * zoom + halfH
                };
            }

            function screenToWorld(sx, sy) {
                return {
                    wx: (sx - halfW) / zoom + panX,
                    wy: (sy - halfH) / zoom + panY
                };
            }

            // --- Get planet world position ---
            function getPlanetWorldPos(planet, time) {
                const angle = planet.initialAngle + time * planet.speed * (2 * Math.PI / 25);
                const wx = planet.orbitRx * Math.cos(angle);
                const wy = planet.orbitRy * Math.sin(angle);
                return { wx, wy, angle };
            }

            // --- Hit test ---
            function hitTestPlanet(screenX, screenY) {
                const world = screenToWorld(screenX, screenY);
                let bestPlanet = null;
                let bestDist = Infinity;
                const toleranceWorld = 10 / zoom;

                for (const planet of planetDefs) {
                    const pos = getPlanetWorldPos(planet, elapsedTime);
                    const dx = world.wx - pos.wx;
                    const dy = world.wy - pos.wy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const threshold = planet.radius + toleranceWorld;
                    if (dist < threshold && dist < bestDist) {
                        bestDist = dist;
                        bestPlanet = planet;
                    }
                }
                return bestPlanet;
            }

            // --- Show/Hide info panel ---
            function showInfoPanel(planet) {
                selectedPlanetName = planet.name;
                panelIcon.style.background = `radial-gradient(circle at 35% 35%, ${planet.glowColor}, ${planet.color} 70%, #222)`;
                panelIcon.style.boxShadow = `0 0 30px ${planet.glowColor}44, 0 0 12px ${planet.color}66`;
                panelName.textContent = planet.name;
                panelDiameter.textContent = planet.diameter;
                panelDistance.textContent = planet.distance;
                panelPeriod.textContent = planet.period;
                panelFact.textContent = planet.fact;
                infoPanel.classList.add('visible');
                hintText.style.opacity = '0';
            }

            function hideInfoPanel() {
                selectedPlanetName = null;
                infoPanel.classList.remove('visible');
                hintText.style.opacity = '1';
            }

            closePanelBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                hideInfoPanel();
            });

            // --- Mouse Events ---
            canvas.addEventListener('mousedown', (e) => {
                if (e.target === closePanelBtn || closePanelBtn.contains(e.target)) return;
                if (infoPanel.contains(e.target) && e.target !== canvas) return;
                isDragging = true;
                totalDragDist = 0;
                dragStartScreenX = e.clientX;
                dragStartScreenY = e.clientY;
                dragStartPanX = panX;
                dragStartPanY = panY;
                body.classList.add('dragging');
                body.classList.remove('pointer-cursor');
            });

            window.addEventListener('mousemove', (e) => {
                mouseScreenX = e.clientX;
                mouseScreenY = e.clientY;

                if (isDragging) {
                    const dx = e.clientX - dragStartScreenX;
                    const dy = e.clientY - dragStartScreenY;
                    totalDragDist = Math.sqrt(dx * dx + dy * dy);
                    panX = dragStartPanX - dx / zoom;
                    panY = dragStartPanY - dy / zoom;
                } else {
                    const hovered = hitTestPlanet(e.clientX, e.clientY);
                    const prevHovered = hoveredPlanetName;
                    hoveredPlanetName = hovered ? hovered.name : null;
                    if (hoveredPlanetName !== prevHovered) {
                        if (hoveredPlanetName) {
                            body.classList.add('pointer-cursor');
                        } else {
                            body.classList.remove('pointer-cursor');
                        }
                    }
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                body.classList.remove('dragging');

                if (totalDragDist < 5) {
                    // It was a click
                    const planet = hitTestPlanet(e.clientX, e.clientY);
                    if (planet) {
                        showInfoPanel(planet);
                    } else if (!infoPanel.contains(e.target) || e.target === canvas) {
                        hideInfoPanel();
                    }
                }
                if (!hoveredPlanetName) body.classList.remove('pointer-cursor');
            });

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const worldBefore = screenToWorld(e.clientX, e.clientY);
                const oldZoom = zoom;
                const zoomFactor = 1.08;
                if (e.deltaY < 0) {
                    zoom = Math.min(ZOOM_MAX, zoom * zoomFactor);
                } else {
                    zoom = Math.max(ZOOM_MIN, zoom / zoomFactor);
                }
                if (zoom !== oldZoom) {
                    panX = worldBefore.wx - (e.clientX - halfW) / zoom;
                    panY = worldBefore.wy - (e.clientY - halfH) / zoom;
                }
            }, { passive: false });

            // Touch support
            let touchStartDist = 0;
            let touchStartZoom = 1;
            let touchStartPanX = 0;
            let touchStartPanY = 0;
            let touchMidX = 0;
            let touchMidY = 0;
            let touchCount = 0;
            let touchDragActive = false;

            canvas.addEventListener('touchstart', (e) => {
                touchCount = e.touches.length;
                if (touchCount === 1) {
                    touchDragActive = true;
                    totalDragDist = 0;
                    dragStartScreenX = e.touches[0].clientX;
                    dragStartScreenY = e.touches[0].clientY;
                    dragStartPanX = panX;
                    dragStartPanY = panY;
                    body.classList.add('dragging');
                } else if (touchCount === 2) {
                    touchDragActive = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDist = Math.sqrt(dx * dx + dy * dy);
                    touchStartZoom = zoom;
                    touchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    touchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    touchStartPanX = panX;
                    touchStartPanY = panY;
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 2) {
                    touchDragActive = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const newDist = Math.sqrt(dx * dx + dy * dy);
                    const newMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const newMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    if (touchStartDist > 0) {
                        const scale = newDist / touchStartDist;
                        const newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, touchStartZoom * scale));
                        const worldBefore = screenToWorld(touchMidX, touchMidY);
                        zoom = newZoom;
                        panX = worldBefore.wx - (touchMidX - halfW) / zoom;
                        panY = worldBefore.wy - (touchMidY - halfH) / zoom;
                    }
                    if (newMidX !== touchMidX || newMidY !== touchMidY) {
                        const worldBefore = screenToWorld(touchMidX, touchMidY);
                        touchMidX = newMidX;
                        touchMidY = newMidY;
                        const worldAfter = screenToWorld(touchMidX, touchMidY);
                        panX += worldBefore.wx - worldAfter.wx;
                        panY += worldBefore.wy - worldAfter.wy;
                    }
                } else if (e.touches.length === 1 && touchDragActive && touchCount === 1) {
                    const dx = e.touches[0].clientX - dragStartScreenX;
                    const dy = e.touches[0].clientY - dragStartScreenY;
                    totalDragDist = Math.sqrt(dx * dx + dy * dy);
                    panX = dragStartPanX - dx / zoom;
                    panY = dragStartPanY - dy / zoom;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                if (touchCount === 1 && touchDragActive && totalDragDist < 8 && e.changedTouches.length > 0) {
                    const planet = hitTestPlanet(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    if (planet) {
                        showInfoPanel(planet);
                    } else {
                        hideInfoPanel();
                    }
                }
                touchCount = e.touches.length;
                touchDragActive = touchCount === 1;
                if (touchCount === 0) {
                    body.classList.remove('dragging');
                    touchDragActive = false;
                }
                if (touchCount === 2) touchDragActive = false;
            });

            // --- Drawing ---
            function drawStars(time) {
                for (const star of stars) {
                    const screen = worldToScreen(star.x, star.y);
                    // Only draw if reasonably on screen
                    if (screen.sx < -50 || screen.sx > canvasWidth + 50 || screen.sy < -50 || screen.sy > canvasHeight +
                        50) continue;
                    const opacity = star.baseOpacity + star.twinkleAmp * Math.sin(time * star.twinkleSpeed + star
                        .twinklePhase);
                    const clampedOpacity = Math.max(0.08, Math.min(1, opacity));
                    const size = star.size * zoom;
                    const displaySize = Math.max(0.3, Math.min(size, 4));
                    ctx.beginPath();
                    ctx.arc(screen.sx, screen.sy, displaySize, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${star.hue}, ${star.saturation}%, 85%, ${clampedOpacity})`;
                    ctx.fill();
                }
            }

            function drawOrbitPath(planet) {
                const sunScreen = worldToScreen(0, 0);
                const rx = planet.orbitRx * zoom;
                const ry = planet.orbitRy * zoom;
                if (rx < 0.5 || ry < 0.5) return;
                ctx.beginPath();
                ctx.ellipse(sunScreen.sx, sunScreen.sy, rx, ry, 0, 0, Math.PI * 2);
                ctx.setLineDash([6, 14]);
                ctx.strokeStyle = 'rgba(255,255,255,0.09)';
                ctx.lineWidth = Math.max(0.5, 1 * zoom);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            function drawSun(time) {
                const sunScreen = worldToScreen(0, 0);
                const sunRadius = 30 * zoom;
                const pulse = Math.sin(time * 1.8) * 3 + Math.sin(time * 3.1) * 1.5;
                const glowOuter = sunRadius * 2.6 + pulse * zoom;
                const glowMid = sunRadius * 1.7 + pulse * 0.6 * zoom;
                const glowInner = sunRadius * 1.15;

                // Outermost glow
                if (glowOuter > sunRadius) {
                    const gradOuter = ctx.createRadialGradient(sunScreen.sx, sunScreen.sy, sunRadius * 0.9, sunScreen.sx,
                        sunScreen.sy, glowOuter);
                    gradOuter.addColorStop(0, 'rgba(255,180,40,0.35)');
                    gradOuter.addColorStop(0.4, 'rgba(255,120,20,0.12)');
                    gradOuter.addColorStop(0.7, 'rgba(255,60,10,0.03)');
                    gradOuter.addColorStop(1, 'rgba(255,30,5,0)');
                    ctx.beginPath();
                    ctx.arc(sunScreen.sx, sunScreen.sy, glowOuter, 0, Math.PI * 2);
                    ctx.fillStyle = gradOuter;
                    ctx.fill();
                }

                // Mid glow
                const gradMid = ctx.createRadialGradient(sunScreen.sx, sunScreen.sy, sunRadius * 0.85, sunScreen.sx, sunScreen
                    .sy, glowMid);
                gradMid.addColorStop(0, 'rgba(255,230,100,0.7)');
                gradMid.addColorStop(0.5, 'rgba(255,160,30,0.3)');
                gradMid.addColorStop(1, 'rgba(255,80,10,0)');
                ctx.beginPath();
                ctx.arc(sunScreen.sx, sunScreen.sy, glowMid, 0, Math.PI * 2);
                ctx.fillStyle = gradMid;
                ctx.fill();

                // Inner glow
                const gradInner = ctx.createRadialGradient(sunScreen.sx, sunScreen.sy, sunRadius * 0.3, sunScreen.sx,
                    sunScreen.sy, glowInner);
                gradInner.addColorStop(0, 'rgba(255,255,240,1)');
                gradInner.addColorStop(0.3, 'rgba(255,240,180,0.9)');
                gradInner.addColorStop(0.6, 'rgba(255,180,40,0.5)');
                gradInner.addColorStop(1, 'rgba(255,100,15,0)');
                ctx.beginPath();
                ctx.arc(sunScreen.sx, sunScreen.sy, glowInner, 0, Math.PI * 2);
                ctx.fillStyle = gradInner;
                ctx.fill();

                // Core
                const gradCore = ctx.createRadialGradient(sunScreen.sx, sunScreen.sy, 0, sunScreen.sx, sunScreen.sy, sunRadius);
                gradCore.addColorStop(0, '#ffffff');
                gradCore.addColorStop(0.25, '#fffef0');
                gradCore.addColorStop(0.55, '#ffe880');
                gradCore.addColorStop(0.8, '#ffb830');
                gradCore.addColorStop(1, '#ff6a10');
                ctx.beginPath();
                ctx.arc(sunScreen.sx, sunScreen.sy, sunRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradCore;
                ctx.fill();
            }

            function drawPlanet(planet, time) {
                const pos = getPlanetWorldPos(planet, time);
                const screen = worldToScreen(pos.wx, pos.wy);
                const r = planet.radius * zoom;
                if (r < 0.6) return { screen, worldPos: pos, radiusOnScreen: r };

                // Glow
                if (r > 2) {
                    const glowGrad = ctx.createRadialGradient(screen.sx, screen.sy, r * 0.7, screen.sx, screen.sy, r * 2.2);
                    glowGrad.addColorStop(0, planet.glowColor + '55');
                    glowGrad.addColorStop(1, 'transparent');
                    ctx.beginPath();
                    ctx.arc(screen.sx, screen.sy, r * 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = glowGrad;
                    ctx.fill();
                }

                // Main body
                const bodyGrad = ctx.createRadialGradient(screen.sx - r * 0.25, screen.sy - r * 0.3, r * 0.05, screen.sx,
                    screen.sy, r);
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.35, planet.glowColor);
                bodyGrad.addColorStop(0.75, planet.color);
                bodyGrad.addColorStop(1, '#111');
                ctx.beginPath();
                ctx.arc(screen.sx, screen.sy, r, 0, Math.PI * 2);
                ctx.fillStyle = bodyGrad;
                ctx.fill();

                // Jupiter bands
                if (planet.hasBands && r > 6) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(screen.sx, screen.sy, r, 0, Math.PI * 2);
                    ctx.clip();
                    const bandColors = [
                        'rgba(180,130,80,0.35)',
                        'rgba(220,170,120,0.25)',
                        'rgba(160,110,60,0.4)',
                        'rgba(240,190,140,0.2)',
                        'rgba(170,120,70,0.35)',
                        'rgba(200,150,100,0.25)',
                    ];
                    const bandHeight = r * 2 / (bandColors.length + 1);
                    for (let i = 0; i < bandColors.length; i++) {
                        const by = screen.sy - r + bandHeight * (i + 0.7);
                        ctx.fillStyle = bandColors[i];
                        ctx.fillRect(screen.sx - r, by, r * 2, bandHeight * 0.6);
                    }
                    ctx.restore();
                }

                // Saturn rings
                if (planet.hasRings && r > 4) {
                    ctx.save();
                    ctx.translate(screen.sx, screen.sy);
                    const ringTilt = 0.44;
                    ctx.rotate(ringTilt);
                    const ringRx = r * 2.3;
                    const ringRy = r * 0.55;
                    // Outer ring
                    ctx.beginPath();
                    ctx.ellipse(0, 0, ringRx, ringRy, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(210,185,150,0.75)';
                    ctx.lineWidth = Math.max(1.5, r * 0.28);
                    ctx.stroke();
                    // Inner gap
                    ctx.beginPath();
                    ctx.ellipse(0, 0, ringRx * 0.72, ringRy * 0.72, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = Math.max(0.8, r * 0.12);
                    ctx.stroke();
                    // Inner ring
                    ctx.beginPath();
                    ctx.ellipse(0, 0, ringRx * 0.58, ringRy * 0.58, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(200,175,140,0.55)';
                    ctx.lineWidth = Math.max(1, r * 0.18);
                    ctx.stroke();
                    ctx.restore();
                }

                // Highlight for selected/hovered
                if (planet.name === selectedPlanetName || planet.name === hoveredPlanetName) {
                    ctx.beginPath();
                    ctx.arc(screen.sx, screen.sy, r + 3 * zoom, 0, Math.PI * 2);
                    ctx.strokeStyle = planet.name === selectedPlanetName ?
                        'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.45)';
                    ctx.lineWidth = Math.max(1.5, 2.5 * zoom);
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                return { screen, worldPos: pos, radiusOnScreen: r };
            }

            function drawTrails(time) {
                for (const planet of planetDefs) {
                    const trail = trails[planet.name];
                    if (trail.length < 2) continue;
                    const totalPoints = trail.length;
                    for (let i = 0; i < totalPoints - 1; i++) {
                        const alpha = (i / totalPoints) * 0.4;
                        if (alpha < 0.01) continue;
                        const p1 = worldToScreen(trail[i].x, trail[i].y);
                        const p2 = worldToScreen(trail[i + 1].x, trail[i + 1].y);
                        ctx.beginPath();
                        ctx.moveTo(p1.sx, p1.sy);
                        ctx.lineTo(p2.sx, p2.sy);
                        ctx.strokeStyle = planet.color.replace(')', `, ${alpha})`).replace('rgb',
                            'rgba');
                        if (planet.color.startsWith('#')) {
                            const hex = planet.color;
                            const r = parseInt(hex.slice(1, 3), 16);
                            const g = parseInt(hex.slice(3, 5), 16);
                            const b = parseInt(hex.slice(5, 7), 16);
                            ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
                        }
                        ctx.lineWidth = Math.max(0.4, planet.radius * zoom * 0.55 * (i / totalPoints));
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                }
            }

            // --- Animation ---
            let lastTimestamp = 0;
            let frameCount = 0;

            function animate(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                let dt = (timestamp - lastTimestamp) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2; // Cap to avoid jumps
                lastTimestamp = timestamp;
                elapsedTime += dt;
                frameCount++;

                // Update trails
                for (const planet of planetDefs) {
                    const pos = getPlanetWorldPos(planet, elapsedTime);
                    const trail = trails[planet.name];
                    trail.push({ x: pos.wx, y: pos.wy });
                    while (trail.length > MAX_TRAIL_POINTS) trail.shift();
                }

                // Clear
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                ctx.fillStyle = '#000005';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                // Draw stars
                drawStars(elapsedTime);

                // Draw orbit paths
                for (const planet of planetDefs) {
                    drawOrbitPath(planet);
                }

                // Draw trails
                drawTrails(elapsedTime);

                // Draw sun
                drawSun(elapsedTime);

                // Draw planets
                const planetScreenData = [];
                for (const planet of planetDefs) {
                    const data = drawPlanet(planet, elapsedTime);
                    planetScreenData.push({ planet, data });
                }

                // Draw subtle sun highlight on top
                const sunScr = worldToScreen(0, 0);
                const sunR = 30 * zoom;
                const highlightGrad = ctx.createRadialGradient(sunScr.sx - sunR * 0.2, sunScr.sy - sunR * 0.25, sunR * 0.05,
                    sunScr.sx, sunScr.sy, sunR);
                highlightGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
                highlightGrad.addColorStop(0.5, 'rgba(255,255,255,0.08)');
                highlightGrad.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(sunScr.sx, sunScr.sy, sunR, 0, Math.PI * 2);
                ctx.fillStyle = highlightGrad;
                ctx.fill();

                requestAnimationFrame(animate);
            }

            // --- Keyboard ---
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    hideInfoPanel();
                }
                if (e.key === '0' || e.key === 'r') {
                    // Reset view
                    panX = 0;
                    panY = 0;
                    zoom = 1.0;
                }
            });

            // --- Click on info panel should not propagate to canvas ---
            infoPanel.addEventListener('mousedown', (e) => {
                e.stopPropagation();
            });
            infoPanel.addEventListener('touchstart', (e) => {
                e.stopPropagation();
            });

            // --- Start ---
            resizeCanvas();
            // Set initial zoom to fit Neptune's orbit
            const neptuneOrbitMax = 450;
            const fitZoom = Math.min(canvasWidth, canvasHeight) / (neptuneOrbitMax * 2.4);
            zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, fitZoom));
            panX = 0;
            panY = 0;
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
