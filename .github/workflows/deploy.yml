name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Next.js
        working-directory: website
        run: npx next build
        env:
          NEXT_PUBLIC_APP_URL: https://temuclaude.com
          # Other env vars are not needed for build — only for runtime

      - name: Check for build errors
        working-directory: website
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed — .next directory not found"
            exit 1
          fi
          echo "Build succeeded — .next directory exists"
