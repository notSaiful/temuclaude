name: Apply Production Database Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type APPLY to run committed migrations against production
        required: true
        type: string

jobs:
  migrate:
    if: github.event.inputs.confirm == 'APPLY'
    runs-on: ubuntu-latest
    environment: production-database
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Verify migration packet
        run: node website/scripts/verify-supabase-migrations.mjs
      - name: Apply committed migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push
