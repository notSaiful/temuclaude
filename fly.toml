# fly.toml — Timuclaude Fly.io deployment configuration
# Deploy with: fly deploy

app = "temuclaude"
primary_region = "bom"  # Mumbai — closest to Nagpur, India

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "60s"
  method = "get"
  path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  TEMUCLAUDE_MASTER_KEY = "change-me-in-fly-secrets"