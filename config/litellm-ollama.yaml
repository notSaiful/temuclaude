# Timuclaude — LiteLLM Proxy Configuration
# Phase 1: no database (cost tracking + adaptive router added in Phase 3 with Postgres)

model_list:
  - model_name: timuclaude
    litellm_params:
      model: ollama_chat/glm-5.2:cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

  - model_name: glm-5.2
    litellm_params:
      model: ollama_chat/glm-5.2:cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

  - model_name: deepseek-v4-pro
    litellm_params:
      model: ollama_chat/deepseek-v4-pro:cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

  - model_name: kimi-k2.6
    litellm_params:
      model: ollama_chat/kimi-k2.6:cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

  - model_name: minimax-m3
    litellm_params:
      model: ollama_chat/minimax-m3:cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

  - model_name: nemotron-3-ultra
    litellm_params:
      model: ollama_chat/nemotron-3-ultra:cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

  - model_name: gpt-oss-120b
    litellm_params:
      model: ollama_chat/gpt-oss:120b-cloud
      api_base: http://localhost:11434
      keep_alive: "30m"

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  allowed_fails: 3

# Fallbacks: if a model fails, try the next one
fallbacks:
  - timuclaude: ["glm-5.2", "deepseek-v4-pro", "kimi-k2.6"]
  - glm-5.2: ["deepseek-v4-pro", "kimi-k2.6"]
  - deepseek-v4-pro: ["glm-5.2", "kimi-k2.6"]
  - kimi-k2.6: ["glm-5.2", "deepseek-v4-pro"]
  - minimax-m3: ["glm-5.2", "deepseek-v4-pro"]
  - nemotron-3-ultra: ["glm-5.2", "deepseek-v4-pro"]
  - gpt-oss-120b: ["glm-5.2", "deepseek-v4-pro"]
litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: "os.environ/TIMUCLAUDE_MASTER_KEY"
