# Temuclaude — OpenRouter LiteLLM Configuration
# Uses OpenRouter as backend (scales to thousands of concurrent users)
# Requires OPENROUTER_API_KEY environment variable

model_list:
  # === USER-FACING MODEL ===
  - model_name: temuclaude
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: "os.environ/OPENROUTER_API_KEY"
      keep_alive: "30m"

  # === INDIVIDUAL MODELS ===
  - model_name: glm-5.2
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: deepseek-v4-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: kimi-k3
    litellm_params:
      model: openrouter/moonshotai/kimi-k3
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: minimax-m3
    litellm_params:
      model: openrouter/minimax/minimax-m3
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: nemotron-3-ultra
    litellm_params:
      model: openrouter/nvidia/nemotron-3-ultra-550b-a55b
      api_key: "os.environ/OPENROUTER_API_KEY"

  # === CHEAP ROUTE (free models available on OpenRouter) ===
  - model_name: gpt-oss-120b
    litellm_params:
      model: openrouter/openai/gpt-oss-120b
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: gpt-oss-120b-free
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: nemotron-3-ultra-free
    litellm_params:
      model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
      api_key: "os.environ/OPENROUTER_API_KEY"

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  allowed_fails: 3

# Fallbacks: if a model fails, try the next one
fallbacks:
  - temuclaude: ["glm-5.2", "deepseek-v4-pro", "kimi-k3"]
  - glm-5.2: ["deepseek-v4-pro", "kimi-k3"]
  - deepseek-v4-pro: ["glm-5.2", "kimi-k3"]
  - kimi-k3: ["glm-5.2", "deepseek-v4-pro"]
  - minimax-m3: ["glm-5.2", "deepseek-v4-pro"]
  - nemotron-3-ultra: ["glm-5.2", "deepseek-v4-pro"]
  - gpt-oss-120b: ["glm-5.2", "deepseek-v4-pro"]

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: "os.environ/TEMUCLAUDE_MASTER_KEY"
